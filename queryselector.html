<!DOCTYPE html>
<html>
<head>
    <title>querySelector Example</title>
</head>
<body>

    <h2 id="title">Welcome to JavaScript</h2>

    <h2 id="title">Welcome to JavaScript</h2>

    <button onclick="changeText()">Click Here</button>

    <script>
        function changeText() {
            let heading = document.querySelector("#title");
            heading.innerHTML = "Hello Students!";
        }
    </script>

</body>
</html>
